name: Pull Request 🔍️
run-name: Pull Request 🔍️

on:
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality-gate:
        uses: ./.github/workflows/_quality-gate.yml
        secrets: inherit


    build:
        needs: quality-gate
        uses: ./.github/workflows/_build-and-push.yml
        with:
            ref: ${{ github.sha }}
            push: false
            affected: true
            base-ref: origin/${{ github.base_ref }}

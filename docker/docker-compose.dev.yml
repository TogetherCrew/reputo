networks:
    dev:
        driver: bridge

volumes:
    mongodb_data:
        driver: local
    temporal_elasticsearch_data:
        driver: local
    temporal_postgresql_data:
        driver: local

services:
    mongodb:
        container_name: mongodb
        image: mongo:7.0.5
        restart: unless-stopped
        networks: [dev]
        command: ['--replSet', 'rs0', '--keyFile', '/etc/mongo/keyfile.txt']
        ports:
            - 27017:27017
        env_file:
            - ./env/mongodb.env
        volumes:
            - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
            - ./mongo/healthcheck.js:/etc/mongo/healthcheck.js:ro
            - ./mongo/keyfile.txt:/etc/mongo/keyfile.txt:ro
            - mongodb_data:/data/db
        healthcheck:
            test: test $(echo $(mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet /etc/mongo/healthcheck.js)) -eq 1
            interval: 60s
            timeout: 60s
            retries: 5
            start_period: 40s

    traefik:
        image: traefik:v3.6
        container_name: traefik
        ports:
            - '80:80'
            - '8080:8080'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks: [dev]
        healthcheck:
            test: ['CMD', 'traefik', 'healthcheck', '--ping']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        command:
            - --api=true
            - --ping=true
            - --providers.docker=true
            - --providers.docker.exposedByDefault=false
            - --entrypoints.web.address=:80
            - --entrypoints.web8080.address=:8080
            - --entrypoints.traefik.address=:8081

    api:
        container_name: api
        build:
            context: ..
            dockerfile: docker/Dockerfile
            target: api
        restart: unless-stopped
        networks: [dev]
        volumes:
            - ../apps/api/src:/prod/api/src:ro
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        env_file:
            - ./env/api.env
        labels:
            - traefik.enable=true
            - traefik.http.routers.api.rule=Host(`localhost`) && PathPrefix(`/api`)
            - traefik.http.routers.api.priority=100
            - traefik.http.routers.api.entrypoints=web,web8080
            - traefik.http.services.api.loadbalancer.server.port=3000

    ui:
        container_name: ui
        build:
            context: ..
            dockerfile: docker/Dockerfile
            target: ui
        restart: unless-stopped
        networks: [dev]
        env_file:
            - ./env/ui.env
        labels:
            - traefik.enable=true
            - traefik.http.routers.ui.rule=Host(`localhost`)
            - traefik.http.routers.ui.priority=1
            - traefik.http.routers.ui.entrypoints=web,web8080
            - traefik.http.services.ui.loadbalancer.server.port=8080

    temporal:
        container_name: temporal
        image: temporalio/auto-setup:1.26.3.0
        restart: unless-stopped
        depends_on:
            - temporal-postgresql
            - temporal-elasticsearch
        ports:
            - '7233:7233'
        env_file: ./env/temporal.env
        networks: [dev]
        healthcheck:
            test:
                [
                    'CMD',
                    'tctl',
                    '--address',
                    'temporal:7233',
                    'workflow',
                    'list',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 90s

    temporal-ui:
        container_name: temporal-ui
        image: temporalio/ui:2.32.0
        restart: unless-stopped
        env_file: ./env/temporal-ui.env
        depends_on:
            - temporal
        ports:
            - '8088:8080'
        networks: [dev]

    temporal-elasticsearch:
        container_name: temporal-elasticsearch
        restart: unless-stopped
        image: elasticsearch:7.17.23
        environment:
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=512mb
            - cluster.routing.allocation.disk.watermark.high=256mb
            - cluster.routing.allocation.disk.watermark.flood_stage=128mb
            - discovery.type=single-node
            - ES_JAVA_OPTS=-Xms256m -Xmx256m
            - xpack.security.enabled=false
        volumes:
            - temporal_elasticsearch_data:/var/lib/elasticsearch/data
        networks: [dev]

    temporal-postgresql:
        container_name: temporal-postgresql
        image: postgres:12.22
        restart: unless-stopped
        env_file: ./env/temporal-postgresql.env
        networks: [dev]

        volumes:
            - temporal_postgresql_data:/var/lib/postgresql/data

    orchestrator-worker:
        container_name: orchestrator-worker
        build:
            context: ..
            dockerfile: docker/Dockerfile
            target: workflows
        command: ['pnpm', 'start:orchestrator']
        restart: unless-stopped
        networks: [dev]
        volumes:
            - ../apps/workflows/src:/prod/workflows/src:ro
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        env_file:
            - ./env/workflows.env

    typescript-worker:
        container_name: typescript-worker
        build:
            context: ..
            dockerfile: docker/Dockerfile
            target: workflows
        command: ['pnpm', 'start:algorithm-typescript']
        restart: unless-stopped
        networks: [dev]
        volumes:
            - ../apps/workflows/src:/prod/workflows/src:ro
        depends_on:
            temporal:
                condition: service_healthy
        env_file:
            - ./env/workflows.env

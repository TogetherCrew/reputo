networks:
    preview:

volumes:
    mongodb_data:
        driver: local
    temporal_elasticsearch_data:
        driver: local
    temporal_postgresql_data:
        driver: local
    onchain_data:
        driver: local

services:
    preview-proxy:
        image: caddy:2
        restart: unless-stopped
        networks: [preview]
        ports:
            - '80:80'
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
        depends_on:
            - ui
            - api
    mongodb:
        container_name: mongodb
        image: mongo:7.0.5
        restart: unless-stopped
        networks: [preview]
        user: '0:0'
        entrypoint: >
            /bin/bash -c "chown 999:999 /etc/mongo/keyfile.txt &&
            chmod 400 /etc/mongo/keyfile.txt &&
            exec docker-entrypoint.sh mongod
            --replSet rs0
            --keyFile /etc/mongo/keyfile.txt
            --bind_ip_all"

        environment:
            - MONGO_INITDB_ROOT_USERNAME=admin
            - MONGO_INITDB_ROOT_PASSWORD=preview_password
            - MONGO_INITDB_DATABASE=reputo_preview

        volumes:
            - ../mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
            - ../mongo/healthcheck.js:/etc/mongo/healthcheck.js:ro
            - ../mongo/keyfile.txt:/etc/mongo/keyfile.txt
            - mongodb_data:/data/db

        healthcheck:
            test: test $(echo $(mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet /etc/mongo/healthcheck.js)) -eq 1
            interval: 60s
            timeout: 60s
            retries: 5
            start_period: 40s

    ui:
        image: ghcr.io/reputo-org/reputo/ui:${PREVIEW_IMAGE_TAG}
        restart: unless-stopped
        networks: [preview]
        environment:
            - PORT=8080

    api:
        container_name: api
        image: ghcr.io/reputo-org/reputo/api:${PREVIEW_IMAGE_TAG}
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        restart: unless-stopped
        networks: [preview]
        environment:
            - NODE_ENV=development
            - PORT=3000
            - LOG_LEVEL=info
            - MONGODB_HOST=mongodb
            - MONGODB_PORT=27017
            - MONGODB_DB_NAME=reputo_preview
            - MONGODB_USER=admin
            - MONGODB_PASSWORD=preview_password
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_REGION=eu-central-1
            - STORAGE_BUCKET=reputo-pullpreview
            - STORAGE_PRESIGN_PUT_TTL=120
            - STORAGE_PRESIGN_GET_TTL=300
            - STORAGE_MAX_SIZE_BYTES=52428800
            - STORAGE_CONTENT_TYPE_ALLOWLIST=text/csv,text/plain,application/json,application/x-sqlite3
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_NAMESPACE=default
            - TEMPORAL_ORCHESTRATOR_TASK_QUEUE=orchestrator-worker
            - TEMPORAL_TASK_QUEUE=orchestrator-worker
            - TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE=algorithm-typescript-worker
            - TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE=algorithm-python-worker
    temporal:
        container_name: temporal
        image: temporalio/auto-setup:1.26.3.0
        restart: unless-stopped
        depends_on:
            - temporal-postgresql
            - temporal-elasticsearch
        ports:
            - '7233:7233'
        networks: [preview]
        environment:
            - DB=postgres12
            - DB_PORT=5432
            - POSTGRES_USER=temporal
            - POSTGRES_PWD=temporal
            - POSTGRES_SEEDS=temporal-postgresql
            - ENABLE_ES=true
            - ES_SEEDS=temporal-elasticsearch
            - ES_VERSION=v7
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'temporal operator cluster health --address $(hostname -i):7233',
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 120s

    temporal-ui:
        container_name: temporal-ui
        image: temporalio/ui:2.32.0
        restart: unless-stopped
        depends_on:
            - temporal
        networks: [preview]
        ports:
            - '8088:8080'
        environment:
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_CORS_ORIGINS=*

    temporal-elasticsearch:
        container_name: temporal-elasticsearch
        restart: unless-stopped
        image: elasticsearch:7.17.23
        environment:
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=512mb
            - cluster.routing.allocation.disk.watermark.high=256mb
            - cluster.routing.allocation.disk.watermark.flood_stage=128mb
            - discovery.type=single-node
            - ES_JAVA_OPTS=-Xms256m -Xmx256m
            - xpack.security.enabled=false
        volumes:
            - temporal_elasticsearch_data:/var/lib/elasticsearch/data
        networks: [preview]

    temporal-postgresql:
        container_name: temporal-postgresql
        image: postgres:12.22
        restart: unless-stopped
        networks: [preview]
        volumes:
            - temporal_postgresql_data:/var/lib/postgresql/data
        environment:
            - POSTGRES_USER=temporal
            - POSTGRES_PASSWORD=temporal
            - POSTGRES_DB=temporal

    orchestrator-worker:
        container_name: orchestrator-worker
        image: ghcr.io/reputo-org/reputo/workflows:${PREVIEW_IMAGE_TAG}
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        command: ['pnpm', 'start:orchestrator']
        restart: unless-stopped
        networks: [preview]
        environment:
            - NODE_ENV=development
            - LOG_LEVEL=info
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_NAMESPACE=default
            - TEMPORAL_ORCHESTRATOR_TASK_QUEUE=orchestrator-worker
            - TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE=algorithm-typescript-worker
            - TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE=algorithm-python-worker
            - TEMPORAL_ONCHAIN_DATA_TASK_QUEUE=onchain-data-worker
            - MONGODB_HOST=mongodb
            - MONGODB_PORT=27017
            - MONGODB_DB_NAME=reputo_preview
            - MONGODB_USER=admin
            - MONGODB_PASSWORD=preview_password
            - STORAGE_BUCKET=reputo-pullpreview
            - STORAGE_PRESIGN_PUT_TTL=120
            - STORAGE_PRESIGN_GET_TTL=300
            - STORAGE_MAX_SIZE_BYTES=52428800
            - STORAGE_CONTENT_TYPE_ALLOWLIST=text/csv,text/plain,application/json,application/x-sqlite3
            - DEEPFUNDING_API_BASE_URL=https://deep-projects.ai/wp-json/deepfunding/v1
            - DEEPFUNDING_API_KEY=${DEEPFUNDING_API_KEY}
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_REGION=eu-central-1
            - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
            - ONCHAIN_DATA_DB_PATH=/data/onchain-data.db
    onchain-data-worker:
        container_name: onchain-data-worker
        image: ghcr.io/reputo-org/reputo/workflows:${PREVIEW_IMAGE_TAG}
        depends_on:
            temporal:
                condition: service_healthy
        command: ['pnpm', 'start:onchain-data']
        restart: unless-stopped
        networks: [preview]
        volumes:
            - onchain_data:/data
        environment:
            - NODE_ENV=development
            - LOG_LEVEL=info
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_NAMESPACE=default
            - TEMPORAL_ORCHESTRATOR_TASK_QUEUE=orchestrator-worker
            - TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE=algorithm-typescript-worker
            - TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE=algorithm-python-worker
            - TEMPORAL_ONCHAIN_DATA_TASK_QUEUE=onchain-data-worker
            - MONGODB_HOST=mongodb
            - MONGODB_PORT=27017
            - MONGODB_DB_NAME=reputo_preview
            - MONGODB_USER=admin
            - MONGODB_PASSWORD=preview_password
            - STORAGE_BUCKET=reputo-pullpreview
            - STORAGE_PRESIGN_PUT_TTL=120
            - STORAGE_PRESIGN_GET_TTL=300
            - STORAGE_MAX_SIZE_BYTES=52428800
            - STORAGE_CONTENT_TYPE_ALLOWLIST=text/csv,text/plain,application/json,application/x-sqlite3
            - DEEPFUNDING_API_BASE_URL=https://deep-projects.ai/wp-json/deepfunding/v1
            - DEEPFUNDING_API_KEY=${DEEPFUNDING_API_KEY}
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_REGION=eu-central-1
            - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
            - ONCHAIN_DATA_DB_PATH=/data/onchain-data.db
    typescript-worker:
        container_name: typescript-worker
        image: ghcr.io/reputo-org/reputo/workflows:${PREVIEW_IMAGE_TAG}
        depends_on:
            temporal:
                condition: service_healthy
        command: ['pnpm', 'start:algorithm-typescript']
        restart: unless-stopped
        networks: [preview]
        volumes:
            - onchain_data:/data
        environment:
            - NODE_ENV=development
            - LOG_LEVEL=info
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_NAMESPACE=default
            - TEMPORAL_ORCHESTRATOR_TASK_QUEUE=orchestrator-worker
            - TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE=algorithm-typescript-worker
            - TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE=algorithm-python-worker
            - TEMPORAL_ONCHAIN_DATA_TASK_QUEUE=onchain-data-worker
            - MONGODB_HOST=mongodb
            - MONGODB_PORT=27017
            - MONGODB_DB_NAME=reputo_preview
            - MONGODB_USER=admin
            - MONGODB_PASSWORD=preview_password
            - STORAGE_BUCKET=reputo-pullpreview
            - STORAGE_PRESIGN_PUT_TTL=120
            - STORAGE_PRESIGN_GET_TTL=300
            - STORAGE_MAX_SIZE_BYTES=52428800
            - STORAGE_CONTENT_TYPE_ALLOWLIST=text/csv,text/plain,application/json,application/x-sqlite3
            - DEEPFUNDING_API_BASE_URL=https://deep-projects.ai/wp-json/deepfunding/v1
            - DEEPFUNDING_API_KEY=${DEEPFUNDING_API_KEY}
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_REGION=eu-central-1
            - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
            - ONCHAIN_DATA_DB_PATH=/data/onchain-data.db

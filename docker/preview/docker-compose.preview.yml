networks:
    preview:

volumes:
    mongodb_data:
        driver: local
    temporal_elasticsearch_data:
        driver: local
    temporal_postgresql_data:
        driver: local
    loki_data:
        driver: local
    grafana_data:
        driver: local
    prometheus_data:
        driver: local

services:
    preview-proxy:
        image: caddy:2
        restart: unless-stopped
        networks: [preview]
        ports:
            - '80:80'
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
        depends_on:
            - ui
            - api
    mongodb:
        container_name: mongodb
        image: mongo:7.0.5
        restart: unless-stopped
        networks: [preview]
        user: '0:0'
        entrypoint: >
            /bin/bash -c "chown 999:999 /etc/mongo/keyfile.txt &&
            chmod 400 /etc/mongo/keyfile.txt &&
            exec docker-entrypoint.sh mongod
            --replSet rs0
            --keyFile /etc/mongo/keyfile.txt
            --bind_ip_all"

        environment:
            - MONGO_INITDB_ROOT_USERNAME=admin
            - MONGO_INITDB_ROOT_PASSWORD=preview_password
            - MONGO_INITDB_DATABASE=reputo_preview

        volumes:
            - ../mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
            - ../mongo/healthcheck.js:/etc/mongo/healthcheck.js:ro
            - ../mongo/keyfile.txt:/etc/mongo/keyfile.txt
            - mongodb_data:/data/db

        healthcheck:
            test: test $(echo $(mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet /etc/mongo/healthcheck.js)) -eq 1
            interval: 60s
            timeout: 60s
            retries: 5
            start_period: 40s

    ui:
        image: ghcr.io/reputo-org/reputo/ui:${PREVIEW_IMAGE_TAG}
        restart: unless-stopped
        networks: [preview]
        environment:
            - PORT=8080

    api:
        container_name: api
        image: ghcr.io/reputo-org/reputo/api:${PREVIEW_IMAGE_TAG}
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        restart: unless-stopped
        networks: [preview]
        environment:
            - NODE_ENV=development
            - PORT=3000
            - LOG_LEVEL=info
            - MONGODB_HOST=mongodb
            - MONGODB_PORT=27017
            - MONGODB_DB_NAME=reputo_preview
            - MONGODB_USER=admin
            - MONGODB_PASSWORD=preview_password
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_REGION=eu-central-1
            - STORAGE_BUCKET=reputo-pullpreview
            - STORAGE_PRESIGN_PUT_TTL=120
            - STORAGE_PRESIGN_GET_TTL=300
            - STORAGE_MAX_SIZE_BYTES=52428800
            - STORAGE_CONTENT_TYPE_ALLOWLIST=text/csv,text/plain,application/json
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_NAMESPACE=default
            - TEMPORAL_ORCHESTRATOR_TASK_QUEUE=orchestrator-worker
            - TEMPORAL_TASK_QUEUE=orchestrator-worker
            - TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE=algorithm-typescript-worker
            - TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE=algorithm-python-worker
    temporal:
        container_name: temporal
        image: temporalio/auto-setup:1.26.3.0
        restart: unless-stopped
        depends_on:
            - temporal-postgresql
            - temporal-elasticsearch
        ports:
            - '7233:7233'
        networks: [preview]
        environment:
            - DB=postgres12
            - DB_PORT=5432
            - POSTGRES_USER=temporal
            - POSTGRES_PWD=temporal
            - POSTGRES_SEEDS=temporal-postgresql
            - ENABLE_ES=true
            - ES_SEEDS=temporal-elasticsearch
            - ES_VERSION=v7
        healthcheck:
            test:
                [
                    'CMD',
                    'tctl',
                    '--address',
                    'temporal:7233',
                    'workflow',
                    'list',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 90s

    temporal-ui:
        container_name: temporal-ui
        image: temporalio/ui:2.32.0
        restart: unless-stopped
        depends_on:
            - temporal
        networks: [preview]
        ports:
            - '8088:8080'
        environment:
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_CORS_ORIGINS=*

    temporal-elasticsearch:
        container_name: temporal-elasticsearch
        restart: unless-stopped
        image: elasticsearch:7.17.23
        environment:
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=512mb
            - cluster.routing.allocation.disk.watermark.high=256mb
            - cluster.routing.allocation.disk.watermark.flood_stage=128mb
            - discovery.type=single-node
            - ES_JAVA_OPTS=-Xms256m -Xmx256m
            - xpack.security.enabled=false
        volumes:
            - temporal_elasticsearch_data:/var/lib/elasticsearch/data
        networks: [preview]

    temporal-postgresql:
        container_name: temporal-postgresql
        image: postgres:12.22
        restart: unless-stopped
        networks: [preview]
        volumes:
            - temporal_postgresql_data:/var/lib/postgresql/data
        environment:
            - POSTGRES_USER=temporal
            - POSTGRES_PASSWORD=temporal
            - POSTGRES_DB=temporal

    orchestrator-worker:
        container_name: orchestrator-worker
        image: ghcr.io/reputo-org/reputo/workflows:${PREVIEW_IMAGE_TAG}
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        command: ['pnpm', 'start:orchestrator']
        restart: unless-stopped
        networks: [preview]
        environment:
            - NODE_ENV=development
            - LOG_LEVEL=info
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_NAMESPACE=default
            - TEMPORAL_ORCHESTRATOR_TASK_QUEUE=orchestrator-worker
            - TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE=algorithm-typescript-worker
            - TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE=algorithm-python-worker
            - MONGODB_HOST=mongodb
            - MONGODB_PORT=27017
            - MONGODB_DB_NAME=reputo_preview
            - MONGODB_USER=admin
            - MONGODB_PASSWORD=preview_password
            - STORAGE_BUCKET=reputo-pullpreview
            - STORAGE_PRESIGN_PUT_TTL=120
            - STORAGE_PRESIGN_GET_TTL=300
            - STORAGE_MAX_SIZE_BYTES=52428800
            - STORAGE_CONTENT_TYPE_ALLOWLIST=text/csv,text/plain,application/json
            - DEEPFUNDING_API_BASE_URL=https://deep-projects.ai/wp-json/deepfunding/v1
            - DEEPFUNDING_API_KEY=${DEEPFUNDING_API_KEY}
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_REGION=eu-central-1
    typescript-worker:
        container_name: typescript-worker
        image: ghcr.io/reputo-org/reputo/workflows:${PREVIEW_IMAGE_TAG}
        depends_on:
            temporal:
                condition: service_healthy
        command: ['pnpm', 'start:algorithm-typescript']
        restart: unless-stopped
        networks: [preview]
        environment:
            - NODE_ENV=development
            - LOG_LEVEL=info
            - TEMPORAL_ADDRESS=temporal:7233
            - TEMPORAL_NAMESPACE=default
            - TEMPORAL_ORCHESTRATOR_TASK_QUEUE=orchestrator-worker
            - TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE=algorithm-typescript-worker
            - TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE=algorithm-python-worker
            - MONGODB_HOST=mongodb
            - MONGODB_PORT=27017
            - MONGODB_DB_NAME=reputo_preview
            - MONGODB_USER=admin
            - MONGODB_PASSWORD=preview_password
            - STORAGE_BUCKET=reputo-pullpreview
            - STORAGE_PRESIGN_PUT_TTL=120
            - STORAGE_PRESIGN_GET_TTL=300
            - STORAGE_MAX_SIZE_BYTES=52428800
            - STORAGE_CONTENT_TYPE_ALLOWLIST=text/csv,text/plain,application/json
            - DEEPFUNDING_API_BASE_URL=https://deep-projects.ai/wp-json/deepfunding/v1
            - DEEPFUNDING_API_KEY=${DEEPFUNDING_API_KEY}
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_REGION=eu-central-1

    loki:
        container_name: loki
        image: grafana/loki:3.6.7
        restart: unless-stopped
        networks: [preview]
        command: -config.file=/etc/loki/loki-config.yml
        volumes:
            - ../observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
            - loki_data:/loki
        healthcheck:
            test: ['CMD', '/usr/bin/loki', '-version']
            interval: 15s
            timeout: 5s
            retries: 10
            start_period: 60s
        deploy:
            resources:
                limits:
                    memory: 256M

    promtail:
        container_name: promtail
        image: grafana/promtail:3.6.7
        restart: unless-stopped
        networks: [preview]
        command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
        environment:
            - OBSERVABILITY_ENV=preview
        volumes:
            - ../observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
        depends_on:
            loki:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 128M

    prometheus:
        container_name: prometheus
        image: prom/prometheus:v3.3.0
        restart: unless-stopped
        networks: [preview]
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
            - --storage.tsdb.path=/prometheus
        volumes:
            - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        depends_on:
            - cadvisor
            - node-exporter
        deploy:
            resources:
                limits:
                    memory: 256M

    cadvisor:
        container_name: cadvisor
        image: gcr.io/cadvisor/cadvisor:v0.52.1
        restart: unless-stopped
        networks: [preview]
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /sys:/sys:ro
            - /var/lib/docker:/var/lib/docker:ro
        deploy:
            resources:
                limits:
                    memory: 128M

    node-exporter:
        container_name: node-exporter
        image: prom/node-exporter:v1.9.0
        restart: unless-stopped
        networks: [preview]
        command:
            - --path.rootfs=/host
        volumes:
            - /:/host:ro
        deploy:
            resources:
                limits:
                    memory: 64M

    grafana:
        container_name: grafana
        image: grafana/grafana:12.4.0
        restart: unless-stopped
        networks: [preview]
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=preview
            - GF_USERS_ALLOW_SIGN_UP=false
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
            - GF_SERVER_ROOT_URL=http://localhost/grafana
            - GF_SERVER_SERVE_FROM_SUB_PATH=true
            - GF_LOG_LEVEL=warn
        volumes:
            - grafana_data:/var/lib/grafana
            - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
        depends_on:
            loki:
                condition: service_healthy
            prometheus:
                condition: service_started

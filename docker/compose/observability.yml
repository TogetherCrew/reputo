networks:
    production:
        external: true

volumes:
    loki_data:
        driver: local
    grafana_data:
        driver: local
    prometheus_data:
        driver: local

services:
    loki:
        container_name: loki
        image: grafana/loki:3.6.7
        restart: unless-stopped
        networks: [production]
        command: -config.file=/etc/loki/loki-config.yml
        volumes:
            - ../config/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
            - loki_data:/loki
        healthcheck:
            test: ['CMD', '/usr/bin/loki', '-health']
            interval: 15s
            timeout: 5s
            retries: 10
            start_period: 60s
        deploy:
            resources:
                limits:
                    memory: 512M

    promtail:
        container_name: promtail
        image: grafana/promtail:3.6.7
        restart: unless-stopped
        networks: [production]
        command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
        environment:
            - OBSERVABILITY_ENV=${OBSERVABILITY_ENV:-production}
        volumes:
            - ../config/observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
        depends_on:
            loki:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 256M

    prometheus:
        container_name: prometheus
        image: prom/prometheus:v3.3.0
        restart: unless-stopped
        networks: [production]
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=15d
            - --storage.tsdb.path=/prometheus
        volumes:
            - ../config/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        depends_on:
            - cadvisor
            - node-exporter
        deploy:
            resources:
                limits:
                    memory: 512M

    cadvisor:
        container_name: cadvisor
        image: gcr.io/cadvisor/cadvisor:v0.52.1
        restart: unless-stopped
        networks: [production]
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /sys:/sys:ro
            - /var/lib/docker:/var/lib/docker:ro
        deploy:
            resources:
                limits:
                    memory: 256M

    node-exporter:
        container_name: node-exporter
        image: prom/node-exporter:v1.9.0
        restart: unless-stopped
        networks: [production]
        command:
            - --path.rootfs=/host
        volumes:
            - /:/host:ro
        deploy:
            resources:
                limits:
                    memory: 128M

    grafana:
        container_name: grafana
        image: grafana/grafana:12.4.0
        restart: unless-stopped
        networks: [production]
        env_file:
            - ../env/grafana.env
        environment:
            GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:?missing GRAFANA_ADMIN_USER}"
            GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?missing GRAFANA_ADMIN_PASSWORD}"
        volumes:
            - grafana_data:/var/lib/grafana
            - ../config/observability/grafana/provisioning:/etc/grafana/provisioning:ro
        depends_on:
            loki:
                condition: service_healthy
            prometheus:
                condition: service_started
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1',
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s
        labels:
            - traefik.enable=true
            - traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN:?missing GRAFANA_DOMAIN}`)
            - traefik.http.routers.grafana.tls=true
            - traefik.http.routers.grafana.tls.certresolver=cloudflare
            - traefik.http.routers.grafana.entrypoints=websecure
            - traefik.http.routers.grafana.middlewares=grafana-auth
            - traefik.http.services.grafana.loadbalancer.server.port=3000

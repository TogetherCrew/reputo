networks:
    production:
        external: true

volumes:
    mongodb_data:
        driver: local
    temporal_elasticsearch_data:
        driver: local
    temporal_postgresql_data:
        driver: local
    loki_data:
        driver: local
    grafana_data:
        driver: local
    prometheus_data:
        driver: local
    onchain_data:
        driver: local

services:
    mongodb:
        container_name: mongodb
        image: mongo:7.0.5
        restart: unless-stopped
        networks: [production]
        command: ['--replSet', 'rs0', '--keyFile', '/etc/mongo/keyfile.txt']
        ports:
            - 27017:27017
        env_file:
            - ./env/mongodb.env
        volumes:
            - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
            - ./mongo/healthcheck.js:/etc/mongo/healthcheck.js:ro
            - ./mongo/keyfile.txt:/etc/mongo/keyfile.txt:ro
            - mongodb_data:/data/db
        healthcheck:
            test: test $(echo $(mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet /etc/mongo/healthcheck.js)) -eq 1
            interval: 60s
            timeout: 60s
            retries: 5
            start_period: 40s

    traefik:
        image: traefik:v3.6
        container_name: traefik
        restart: unless-stopped
        ports:
            - '80:80'
            - '443:443'
        env_file: ./env/shared.env
        environment:
            - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
            - ./certs/:/var/traefik/certs/:rw
        networks: [production]
        healthcheck:
            test:
                [
                    'CMD',
                    'traefik',
                    'healthcheck',
                    '--ping=true',
                    '--ping.entrypoint=web',
                    '--entrypoints.web.address=:80',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        labels:
            - traefik.enable=true
            - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
            - traefik.http.routers.traefik.service=api@internal
            - traefik.http.routers.traefik.middlewares=auth
            - traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_AUTH}
            - traefik.http.middlewares.grafana-auth.basicauth.users=${GRAFANA_AUTH}
            - traefik.http.routers.traefik.entrypoints=websecure
            - traefik.http.routers.traefik.tls=true
            - traefik.http.routers.traefik.tls.certresolver=cloudflare

    ui:
        container_name: ui
        image: ghcr.io/reputo-org/reputo/ui:${IMAGE_TAG}
        restart: unless-stopped
        networks: [production]
        env_file:
            - ./env/ui.env
        labels:
            - traefik.enable=true
            - traefik.http.routers.ui.rule=Host(`${UI_DOMAIN}`)
            - traefik.http.routers.ui.priority=1
            - traefik.http.routers.ui.tls=true
            - traefik.http.routers.ui.tls.certresolver=cloudflare
            - traefik.http.routers.ui.entrypoints=websecure
            - traefik.http.services.ui.loadbalancer.server.port=8080
            - com.centurylinklabs.watchtower.enable=true

    api:
        container_name: api
        image: ghcr.io/reputo-org/reputo/api:${IMAGE_TAG}
        restart: unless-stopped
        networks: [production]
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        labels:
            - traefik.enable=true
            - traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)
            - traefik.http.routers.api.tls=true
            - traefik.http.routers.api.tls.certresolver=cloudflare
            - traefik.http.routers.api.entrypoints=websecure
            - traefik.http.routers.api.middlewares=api-cors
            - traefik.http.routers.api-ui.rule=Host(`${UI_DOMAIN}`) && PathPrefix(`/api`)
            - traefik.http.routers.api-ui.priority=100
            - traefik.http.routers.api-ui.tls=true
            - traefik.http.routers.api-ui.tls.certresolver=cloudflare
            - traefik.http.routers.api-ui.entrypoints=websecure
            - traefik.http.routers.api-ui.middlewares=api-cors
            - traefik.http.routers.api-ui.service=api
            - traefik.http.services.api.loadbalancer.server.port=3000
            - traefik.http.middlewares.api-cors.headers.accessControlAllowMethods=GET,OPTIONS,PUT,POST,DELETE,PATCH
            - traefik.http.middlewares.api-cors.headers.accessControlAllowOriginList=${ALLOWED_ORIGINS:-*}
            - traefik.http.middlewares.api-cors.headers.accessControlAllowHeaders=Content-Type,Authorization,Accept,Origin,X-Requested-With
            - traefik.http.middlewares.api-cors.headers.accessControlMaxAge=3600
            - com.centurylinklabs.watchtower.enable=true
        env_file:
            - ./env/api.env

    watchtower:
        image: containrrr/watchtower:latest
        container_name: watchtower
        restart: unless-stopped
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            - WATCHTOWER_POLL_INTERVAL=60
            - WATCHTOWER_CLEANUP=true
            - WATCHTOWER_INCLUDE_RESTARTING=true
            - WATCHTOWER_LABEL_ENABLE=true
            - WATCHTOWER_ROLLING_RESTART=true
        command: --interval 60 --cleanup
        labels:
            - com.centurylinklabs.watchtower.enable=false
        networks: [production]

    temporal:
        container_name: temporal
        image: temporalio/auto-setup:1.26.3.0
        restart: unless-stopped
        depends_on:
            - temporal-postgresql
            - temporal-elasticsearch
        env_file: ./env/temporal.env
        networks: [production]
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'temporal operator cluster health --address $(hostname -i):7233',
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 120s

    temporal-ui:
        container_name: temporal-ui
        image: temporalio/ui:2.32.0
        restart: unless-stopped
        env_file: ./env/temporal-ui.env
        depends_on:
            - temporal
        networks: [production]

        labels:
            - traefik.enable=true
            - traefik.http.routers.temporal-ui.rule=Host(`${TEMPORAL_UI_DOMAIN}`)
            - traefik.http.routers.temporal-ui.tls=true
            - traefik.http.routers.temporal-ui.tls.certresolver=cloudflare
            - traefik.http.routers.temporal-ui.entrypoints=websecure
            - traefik.http.routers.temporal-ui.middlewares=auth
            - traefik.http.services.temporal-ui.loadbalancer.server.port=8080

    temporal-elasticsearch:
        container_name: temporal-elasticsearch
        restart: unless-stopped
        image: elasticsearch:7.17.23
        environment:
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=512mb
            - cluster.routing.allocation.disk.watermark.high=256mb
            - cluster.routing.allocation.disk.watermark.flood_stage=128mb
            - discovery.type=single-node
            - ES_JAVA_OPTS=-Xms256m -Xmx256m
            - xpack.security.enabled=false
        volumes:
            - temporal_elasticsearch_data:/var/lib/elasticsearch/data
        networks: [production]

    temporal-postgresql:
        container_name: temporal-postgresql
        image: postgres:12.22
        restart: unless-stopped
        env_file: ./env/temporal-postgresql.env
        networks: [production]

        volumes:
            - temporal_postgresql_data:/var/lib/postgresql/data

    orchestrator-worker:
        container_name: orchestrator-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG}
        command: ['pnpm', 'start:orchestrator']
        restart: unless-stopped
        networks: [production]
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        env_file:
            - ./env/workflows.env
        volumes:
            - onchain_data:/data
        labels:
            - com.centurylinklabs.watchtower.enable=true

    typescript-worker:
        container_name: typescript-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG}
        command: ['pnpm', 'start:algorithm-typescript']
        restart: unless-stopped
        networks: [production]
        depends_on:
            temporal:
                condition: service_healthy
        env_file:
            - ./env/workflows.env
        volumes:
            - onchain_data:/data
        labels:
            - com.centurylinklabs.watchtower.enable=true

    loki:
        container_name: loki
        image: grafana/loki:3.6.7
        restart: unless-stopped
        networks: [production]
        command: -config.file=/etc/loki/loki-config.yml
        volumes:
            - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
            - loki_data:/loki
        healthcheck:
            test: ['CMD', '/usr/bin/loki', '-health']
            interval: 15s
            timeout: 5s
            retries: 10
            start_period: 60s
        deploy:
            resources:
                limits:
                    memory: 512M
        labels:
            - com.centurylinklabs.watchtower.enable=false

    promtail:
        container_name: promtail
        image: grafana/promtail:3.6.7
        restart: unless-stopped
        networks: [production]
        command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
        environment:
            - OBSERVABILITY_ENV=${OBSERVABILITY_ENV:-production}
        volumes:
            - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
        depends_on:
            loki:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 256M
        labels:
            - com.centurylinklabs.watchtower.enable=false

    prometheus:
        container_name: prometheus
        image: prom/prometheus:v3.3.0
        restart: unless-stopped
        networks: [production]
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=15d
            - --storage.tsdb.path=/prometheus
        volumes:
            - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        depends_on:
            - cadvisor
            - node-exporter
        deploy:
            resources:
                limits:
                    memory: 512M
        labels:
            - com.centurylinklabs.watchtower.enable=false

    cadvisor:
        container_name: cadvisor
        image: gcr.io/cadvisor/cadvisor:v0.52.1
        restart: unless-stopped
        networks: [production]
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /sys:/sys:ro
            - /var/lib/docker:/var/lib/docker:ro
        deploy:
            resources:
                limits:
                    memory: 256M
        labels:
            - com.centurylinklabs.watchtower.enable=false

    node-exporter:
        container_name: node-exporter
        image: prom/node-exporter:v1.9.0
        restart: unless-stopped
        networks: [production]
        command:
            - --path.rootfs=/host
        volumes:
            - /:/host:ro
        deploy:
            resources:
                limits:
                    memory: 128M
        labels:
            - com.centurylinklabs.watchtower.enable=false

    grafana:
        container_name: grafana
        image: grafana/grafana:12.4.0
        restart: unless-stopped
        networks: [production]
        env_file:
            - ./env/grafana.env
        volumes:
            - grafana_data:/var/lib/grafana
            - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
        depends_on:
            loki:
                condition: service_healthy
            prometheus:
                condition: service_started
        healthcheck:
            test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1']
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s
        labels:
            - com.centurylinklabs.watchtower.enable=false
            - traefik.enable=true
            - traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN}`)
            - traefik.http.routers.grafana.tls=true
            - traefik.http.routers.grafana.tls.certresolver=cloudflare
            - traefik.http.routers.grafana.entrypoints=websecure
            - traefik.http.routers.grafana.middlewares=grafana-auth
            - traefik.http.services.grafana.loadbalancer.server.port=3000

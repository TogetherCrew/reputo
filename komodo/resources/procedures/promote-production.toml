[[procedure]]
name = "promote-production"
description = "Deploy the production application stack after GitHub Actions promotes immutable image tags to production."
tags = ["reputo", "env:production", "promotion"]

[procedure.config]
schedule = ""
schedule_enabled = false
schedule_alert = false
failure_alert = true
webhook_enabled = true
webhook_secret = "[[KOMODO_WEBHOOK_SECRET]]"

[[procedure.config.stage]]
name = "Deploy production apps"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "reputo-apps-production", execution.params.services = [], enabled = true },
]

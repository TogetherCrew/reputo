[[stack]]
name = "reputo-apps-staging"
description = "Staging application stack: API, UI, and workflow workers."
tags = ["reputo", "staging", "apps"]
deploy = false

[stack.config]
server_id = "staging"
project_name = "reputo"
files_on_host = true
run_directory = "/opt/reputo"
file_paths = ["docker/compose/apps.yml"]
env_file_path = ".komodo-reputo-apps-staging.env"
environment = """
IMAGE_TAG=staging
TRAEFIK_DOMAIN=[[STAGING_TRAEFIK_DOMAIN]]
UI_DOMAIN=[[STAGING_UI_DOMAIN]]
API_DOMAIN=[[STAGING_API_DOMAIN]]
TEMPORAL_UI_DOMAIN=[[STAGING_TEMPORAL_UI_DOMAIN]]
TRAEFIK_AUTH=[[STAGING_TRAEFIK_AUTH]]
CF_DNS_API_TOKEN=[[STAGING_CF_DNS_API_TOKEN]]
GRAFANA_DOMAIN=[[STAGING_GRAFANA_DOMAIN]]
GRAFANA_AUTH=[[STAGING_GRAFANA_AUTH]]
OBSERVABILITY_ENV=staging
ALLOWED_ORIGINS=[[STAGING_ALLOWED_ORIGINS]]
NODE_ENV=production
LOG_LEVEL=info
MONGODB_USER=[[STAGING_MONGODB_USER]]
MONGODB_PASSWORD=[[STAGING_MONGODB_PASSWORD]]
AWS_ACCESS_KEY_ID=[[STAGING_AWS_ACCESS_KEY_ID]]
AWS_SECRET_ACCESS_KEY=[[STAGING_AWS_SECRET_ACCESS_KEY]]
DEEP_ID_CLIENT_SECRET=[[STAGING_DEEP_ID_CLIENT_SECRET]]
AUTH_TOKEN_ENCRYPTION_KEY=[[STAGING_AUTH_TOKEN_ENCRYPTION_KEY]]
DEEPFUNDING_API_KEY=[[STAGING_DEEPFUNDING_API_KEY]]
ALCHEMY_API_KEY=[[STAGING_ALCHEMY_API_KEY]]
BLOCKFROST_API_KEY=[[STAGING_BLOCKFROST_API_KEY]]
ONCHAIN_DATA_POSTGRES_USER=[[STAGING_ONCHAIN_DATA_POSTGRES_USER]]
ONCHAIN_DATA_POSTGRES_PASSWORD=[[STAGING_ONCHAIN_DATA_POSTGRES_PASSWORD]]
"""
auto_pull = true
run_build = false
poll_for_updates = true
auto_update = false
auto_update_all_services = false
destroy_before_deploy = false
send_alerts = true
webhook_enabled = true
webhook_force_deploy = true
webhook_secret = "[[KOMODO_WEBHOOK_SECRET]]"


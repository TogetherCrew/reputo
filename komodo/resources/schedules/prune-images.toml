[[procedure]]
name = "prune-images"
description = "Prune unused Docker images on staging and production."
tags = ["reputo", "env:staging", "env:production", "maintenance", "schedule"]

[procedure.config]
schedule_format = "English"
schedule = "Every day at 03:30"
schedule_enabled = true
schedule_timezone = "Europe/Vienna"
schedule_alert = false
failure_alert = true
webhook_enabled = false
webhook_secret = "[[KOMODO_WEBHOOK_SECRET]]"

[[procedure.config.stage]]
name = "Prune images"
enabled = true
executions = [
  { execution.type = "PruneImages", execution.params.server = "staging", enabled = true },
  { execution.type = "PruneImages", execution.params.server = "production", enabled = true },
]
